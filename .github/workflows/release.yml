# Derived from ADR-0001, ADR-0007, ADR-0008, ADR-0013, ADR-0015, and ADR-0019.
# This file operationalizes repository doctrine. It is not an independent policy source.
name: Release

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed

permissions:
  contents: write

env:
  NODE_VERSION: '25'

jobs:
  release:
    if: >
      ${{
          github.event.workflow_run.conclusion == 'success' &&
          github.event.workflow_run.event == 'push' &&
          github.event.workflow_run.head_branch == 'main' &&
          !contains(github.event.workflow_run.head_commit.message, '[skip release]')
      }}
    runs-on: windows-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          package-manager-cache: false

      - name: Setup environment
        uses: ./.github/actions/setup-dotnet-env

      - name: Fetch tags
        run: git fetch --force --tags origin

      - name: Compute Mexico City release date
        id: release_date
        shell: bash
        run: echo "value=$(TZ=America/Mexico_City date +%F)" >> "$GITHUB_OUTPUT"

      - name: Calculate next calver tag
        id: version
        shell: pwsh
        run: |
          $existingHeadTags = @(git tag --points-at HEAD | Where-Object { $_ -match '^v\d{2}\.\d{2}\.\d{2}$' })

          if ($existingHeadTags) {
            $headTag = $existingHeadTags[0]
            "skip=true" >> $env:GITHUB_OUTPUT
            "tag=$headTag" >> $env:GITHUB_OUTPUT
            "semver=$($headTag.TrimStart('v'))" >> $env:GITHUB_OUTPUT
            exit 0
          }

          $prefix = Get-Date -Format "yy.MM"
          $matchingTags = @(git tag --list "v$prefix.*" | Where-Object { $_ -match '^v\d{2}\.\d{2}\.\d{2}$' })

          if ($matchingTags.Count -eq 0) {
            $nextPatch = 0
          }
          else {
            $patches = $matchingTags | ForEach-Object { [int](($_.TrimStart('v') -split '\.')[-1]) }
            $nextPatch = (($patches | Measure-Object -Maximum).Maximum) + 1
          }

          $nextSemver = "$prefix.$($nextPatch.ToString('00'))"
          $nextTag = "v$nextSemver"
          "skip=false" >> $env:GITHUB_OUTPUT
          "tag=$nextTag" >> $env:GITHUB_OUTPUT
          "semver=$nextSemver" >> $env:GITHUB_OUTPUT

      - name: Generate release changelog and notes
        if: steps.version.outputs.skip != 'true'
        shell: pwsh
        run: >
          node ./scripts/generate-changelog.mjs
          --mode release
          --tag "${{ steps.version.outputs.tag }}"
          --date "${{ steps.release_date.outputs.value }}"

      - name: Commit release changelog and notes
        if: steps.version.outputs.skip != 'true'
        shell: bash
        run: |
          if git diff --quiet -- CHANGELOG.md .github/release-notes.md; then
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md .github/release-notes.md
          git commit -m "docs(changelog): release ${{ steps.version.outputs.tag }} [skip ci] [skip release]"
          git push origin HEAD:main

      - name: Create annotated tag
        if: steps.version.outputs.skip != 'true'
        shell: bash
        run: |
          git fetch --force origin main
          git checkout main
          git reset --hard origin/main
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.version.outputs.tag }}" -m "release: ${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Publish self-contained Windows executable (Native AOT)
        if: steps.version.outputs.skip != 'true'
        shell: pwsh
        run: >
          dotnet publish ./src/SolarEngine/SolarEngine.csproj
          --configuration Release
          --runtime win-x64
          --self-contained true
          --output ./artifacts/release/self-contained
          /p:Version=${{ steps.version.outputs.semver }}
          /p:SelfContained=true
          /p:UseNativeAot=true

      - name: Publish framework-dependent Windows executable
        if: steps.version.outputs.skip != 'true'
        shell: pwsh
        run: >
          dotnet publish ./src/SolarEngine/SolarEngine.csproj
          --configuration Release
          --runtime win-x64
          --self-contained false
          --output ./artifacts/release/framework-dependent
          /p:Version=${{ steps.version.outputs.semver }}
          /p:SelfContained=false
          /p:EnableCompressionInSingleFile=false

      - name: Name release assets
        if: steps.version.outputs.skip != 'true'
        id: release_asset
        shell: pwsh
        run: |
          $selfContainedAssetName = "auto-theme-solar-engine-win-x64-self-contained-${{ steps.version.outputs.tag }}.exe"
          $frameworkDependentAssetName = "auto-theme-solar-engine-win-x64-framework-dependent-${{ steps.version.outputs.tag }}.exe"
          $selfContainedAssetPath = "artifacts/release/$selfContainedAssetName"
          $frameworkDependentAssetPath = "artifacts/release/$frameworkDependentAssetName"

          Move-Item -LiteralPath "artifacts/release/self-contained/AutoThemeSolarEngine.exe" -Destination $selfContainedAssetPath -Force
          Move-Item -LiteralPath "artifacts/release/framework-dependent/AutoThemeSolarEngine.exe" -Destination $frameworkDependentAssetPath -Force

          "asset_paths<<EOF" >> $env:GITHUB_OUTPUT
          $selfContainedAssetPath >> $env:GITHUB_OUTPUT
          $frameworkDependentAssetPath >> $env:GITHUB_OUTPUT
          "EOF" >> $env:GITHUB_OUTPUT

      - name: Create GitHub release
        if: steps.version.outputs.skip != 'true'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          target_commitish: main
          body_path: .github/release-notes.md
          files: ${{ steps.release_asset.outputs.asset_paths }}
