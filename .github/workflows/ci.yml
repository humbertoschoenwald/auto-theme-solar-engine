# Derived from ADR-0007 and ADR-0008.
# This file operationalizes repository doctrine. It is not an independent policy source.
name: CI

on:
  push:
    branches:
      - '**'
  pull_request:

permissions:
  contents: read

env:
  NODE_VERSION: '25'

jobs:
  validate:
    if: ${{ github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip ci]') }}
    runs-on: windows-latest

    env:
      SOLUTION_PATH: SolarEngine.slnx
      TEST_PROJECT: tests/SolarEngine.Tests/SolarEngine.Tests.csproj

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          package-manager-cache: false

      - name: Setup environment
        uses: ./.github/actions/setup-dotnet-env

      - name: Commitlint
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "pull_request") {
            $from = "${{ github.event.pull_request.base.sha }}"
            $to = "${{ github.event.pull_request.head.sha }}"
          }
          else {
            $from = "${{ github.event.before }}"
            $to = "${{ github.sha }}"
            if ($from -eq "0000000000000000000000000000000000000000") {
              $from = git rev-list --max-parents=0 HEAD
            }
          }

          & $env:PNPM_BIN exec commitlint --from $from --to $to --verbose

      - name: Repository validation
        shell: pwsh
        run: >
          ./scripts/validate-repository.ps1
          -SolutionPath "${{ env.SOLUTION_PATH }}"
          -TestProject "${{ env.TEST_PROJECT }}"
          -TestResultsDirectory "artifacts/test-results"
          -TestFilter "TestLane=Light"
          -SkipCoverage
          -SkipPublishSmoke
          -SkipNodeInstall

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: artifacts/test-results
