# Derived from ADR-0008, ADR-0015, and ADR-0019.
# This file operationalizes repository doctrine. It is not an independent policy source.
name: Update Changelog

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'CHANGELOG.md'
      - '.github/release-notes.md'
  workflow_dispatch:

concurrency:
  group: update-changelog-main
  cancel-in-progress: true

permissions:
  contents: write

env:
  NODE_VERSION: '25'

jobs:
  update:
    if: ${{ github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip ci]') }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Generate unreleased changelog
        run: node ./scripts/generate-changelog.mjs --mode unreleased

      - name: Commit unreleased changelog
        run: |
          if git diff --quiet -- CHANGELOG.md; then
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git commit -m "chore(changelog): update unreleased changelog [skip ci] [skip release]"
          git push origin HEAD:main
