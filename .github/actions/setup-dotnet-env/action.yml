# Derived from ADR-0007, ADR-0008, and ADR-0015.
# This file operationalizes repository doctrine. It is not an independent policy source.
name: Setup .NET environment
description: Setup .NET 11 preview, Node, pnpm, and project tooling.

inputs:
  dotnet-version:
    description: .NET SDK version to install
    required: false
    default: 11.0.100-preview.3.26207.106
runs:
  using: composite
  steps:
    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: ${{ inputs.dotnet-version }}

    - name: Setup pnpm
      shell: pwsh
      run: |
        $nodeCommand = Get-Command node -ErrorAction Stop
        $nodeDirectory = Split-Path $nodeCommand.Source -Parent
        $corepackCommand = Join-Path $nodeDirectory "corepack.cmd"

        if (-not (Test-Path $corepackCommand)) {
          $corepackCommand = Join-Path $nodeDirectory "corepack"
        }

        if (Test-Path $corepackCommand) {
          & $corepackCommand enable
          & $corepackCommand prepare pnpm@10.33.0 --activate
        }
        else {
          $npmCommand = Join-Path $nodeDirectory "npm.cmd"

          if (-not (Test-Path $npmCommand)) {
            $npmCommand = Join-Path $nodeDirectory "npm"
          }

          if (-not (Test-Path $npmCommand)) {
            throw "Neither corepack nor npm was found next to node in '$nodeDirectory'."
          }

          & $npmCommand install --global pnpm@10.33.0
        }

        $pnpmCommand = (Get-Command pnpm -ErrorAction Stop).Source
        $pnpmBinDirectory = Split-Path $pnpmCommand -Parent

        $pnpmBinDirectory | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8
        "PNPM_BIN=$pnpmCommand" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

        & $pnpmCommand --version

    - name: Install Node tooling
      shell: pwsh
      run: |
        if (-not $env:PNPM_BIN) {
          throw "PNPM_BIN is not set."
        }

        if (Test-Path package.json) {
          & $env:PNPM_BIN install --frozen-lockfile
        }
        else {
          Write-Host "No package.json found. Skipping pnpm install."
        }

    - name: Show SDK info
      shell: pwsh
      run: dotnet --info
