name: Setup .NET environment
description: Setup .NET 11 preview, Node, and project tooling.

inputs:
  dotnet-version:
    description: .NET SDK version to install
    required: false
    default: 11.0.x
  node-version:
    description: Node.js version to install
    required: false
    default: '25'

runs:
  using: composite
  steps:
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ inputs.dotnet-version }}

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}
        cache: npm

    - name: Install Node tooling
      shell: pwsh
      run: |
        if (Test-Path package-lock.json) {
          npm ci
        }
        elseif (Test-Path package.json) {
          npm install --no-fund --no-audit
        }
        else {
          Write-Host "No package.json found. Skipping npm install."
        }

    - name: Show SDK info
      shell: pwsh
      run: dotnet --info
