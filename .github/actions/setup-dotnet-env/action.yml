# Derived from ADR-0007 and ADR-0008.
# This file operationalizes repository doctrine. It is not an independent policy source.
name: Setup .NET environment
description: Setup .NET 11 preview, Node, pnpm, and project tooling.

inputs:
  dotnet-version:
    description: .NET SDK version to install
    required: false
    default: 11.0.x
  node-version:
    description: Node.js version to install
    required: false
    default: '25'

runs:
  using: composite
  steps:
    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: ${{ inputs.dotnet-version }}

    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: ${{ inputs.node-version }}
        cache: pnpm
        cache-dependency-path: pnpm-lock.yaml

    - name: Setup pnpm
      uses: pnpm/action-setup@v6
      with:
        run_install: false

    - name: Install Node tooling
      shell: pwsh
      run: |
        if (Test-Path package.json) {
          pnpm install --frozen-lockfile
        }
        else {
          Write-Host "No package.json found. Skipping pnpm install."
        }

    - name: Show SDK info
      shell: pwsh
      run: dotnet --info
