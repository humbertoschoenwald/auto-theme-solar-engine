# Derived from ADR-0007 and ADR-0008.
# This file operationalizes repository doctrine. It is not an independent policy source.
name: Setup .NET environment
description: Setup .NET 11 preview, Node, pnpm, and project tooling.

inputs:
  dotnet-version:
    description: .NET SDK version to install
    required: false
    default: 11.0.x
runs:
  using: composite
  steps:
    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: ${{ inputs.dotnet-version }}

    - name: Setup pnpm
      shell: pwsh
      run: |
        if (Get-Command corepack -ErrorAction SilentlyContinue) {
          corepack enable
          corepack prepare pnpm@10.33.0 --activate
        }
        else {
          npm install --global pnpm@10.33.0
          $env:PATH = "$env:APPDATA\npm;$env:PATH"
        }

        pnpm --version

    - name: Install Node tooling
      shell: pwsh
      run: |
        if (-not (Get-Command pnpm -ErrorAction SilentlyContinue)) {
          $env:PATH = "$env:APPDATA\npm;$env:PATH"
        }

        if (Test-Path package.json) {
          pnpm install --frozen-lockfile
        }
        else {
          Write-Host "No package.json found. Skipping pnpm install."
        }

    - name: Show SDK info
      shell: pwsh
      run: dotnet --info
